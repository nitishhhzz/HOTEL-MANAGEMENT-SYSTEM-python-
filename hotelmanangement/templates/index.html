<!DOCTYPE html>
<html>
<head>
    <title>Hotel System</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
        }

        .box{
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid black;
            margin-top: 10px;
        }

        img{
            width: 100%;
            height: 150px;
        }

        input, select, button{
            width: 90%;
            padding: 8px;
            margin-top: 10px;
        }

        button{
            background: black;
            color: white;
            border: none;
        }

        .msg{
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<h1>Hotel Booking</h1>

<div class="box">
    <h3>Single Room</h3>
    <img src="{{ url_for('static', filename='photos/singlebed.webp') }}">
    <p>Slots: {{ r1 }}</p>
</div>

<div class="box">
    <h3>Double Room</h3>
    <img src="{{ url_for('static', filename='photos/doublebed.webp') }}">
    <p>Slots: {{ r2 }}</p>
</div>

<div class="box">
    <h3>Deluxe Room</h3>
    <img src="{{ url_for('static', filename='photos/deluxe.webp') }}">
    <p>Slots: {{ r3 }}</p>
</div>

<div class="box">
    <h3>Suite Room</h3>
    <img src="{{ url_for('static', filename='photos/suite.webp') }}">
    <p>Slots: {{ r4 }}</p>
</div>

<br>

<form method="POST">

    <input type="text" name="name" placeholder="Enter Name" required>

    <select name="room" required>
        <option value="1">Single</option>
        <option value="2">Double</option>
        <option value="3">Deluxe</option>
        <option value="4">Suite</option>
    </select>

    <button type="submit">Book</button>

</form>

<div class="msg">
    {{ msg }}
</div>

</body>
</html>
